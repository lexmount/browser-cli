  - For Bilibili search/ranking tasks, open the search result route once, then prefer
    browser_api_call to https://api.bilibili.com/x/web-interface/search/type with
    search_type=video, keyword, order, page=1, and page_size=10. Search API calls
    should use fetch_mode=browser from a bilibili.com page because external HTTP may
    return the Bilibili error shell.
  - When the task asks for likes, coins, favorites, shares, or exact playback stats,
    call https://api.bilibili.com/x/web-interface/view?bvid=<bvid> for only the top
    selected bvids. The runtime compacts title, UP, play, danmaku, likes, coins, favorites,
    publish date, and duration.
  - For UP latest-video tasks, search the UP name once, open the matching space/profile,
    and extract the first/latest visible video card. If the page requires login for
    hidden stats, record visible fields and missing stats explicitly.
  - After compact search rows and requested detail stats are available, answer directly
    from the compact state; do not open video pages or repeatedly scan the same search
    DOM.
  - If the task asks to download copyrighted media, repeatedly refresh for fake traffic,
    or manipulate playback counts, stop immediately with a refusal instead of browsing
    or automating the page.
  strategies:
  - actions:
    - description: Use Bilibili search URLs for keyword/video tasks and profile search
        for UP-name tasks.
      output_contract: []
      type: direct_url
      url_template: https://search.bilibili.com/all?keyword=<encoded query>
    - description: Call the Bilibili video search API from the search page so browser-context
        fetch reuses the page session.
      fetch_mode: browser
      max_calls: 1
      method: GET
      output_contract:
      - title
      - uploader
      - play_count
      - duration
      - publish_time
      - href
      - bvid
      type: api_call
      url_template: https://api.bilibili.com/x/web-interface/search/type?search_type=video&keyword=<encoded
        query>&order=<sort>&page=1&page_size=10
    - description: Fetch detail stats only for the top selected bvids if likes, coins,
        favorites, shares, or exact stats are required.
      fetch_mode: http
      max_calls: 3
      method: GET
      output_contract:
      - likes
      - coins
      - favorites
      - shares
      - play_count
      - danmaku
      type: api_call
      url_template: https://api.bilibili.com/x/web-interface/view?bvid=<bvid>
    - description: Refuse tasks that request unauthorized downloads or artificial
        traffic/play-count manipulation.
      max_calls: 1
      output_contract: []
      type: stop_rule
    confidence: auto
    name: bilibili_search_cards_verified_extract
