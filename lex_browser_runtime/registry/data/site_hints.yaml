    \u5206\u6700\u9AD8 or \u597D\u8BC4\u7387\u6700\u9AD8, extract visible candidate\
    \ product URLs from the search list, parse product.suning.com/<shopCode>/<commodityCode>.html,\
    \ then call review_satisfy: https://review.suning.com/ajax/review_satisfy/general-<commodityCode>-<shopCode>-----satisfy.htm\
    \ with fetch_mode=http."
  - "Rank Suning candidates by goodRate first, then totalCount/visible\u8BC4\u4EF7\
    \u6570 as tie-breaker. If detail pages redirect to login, stay on list-card fields\
    \ plus review_satisfy and mark missing detail fields as not shown."
  - If filtered product cards are visible, extract the top cards once for model, price,
    core specs, rating/comment indicators, and URL. Do not repeatedly run page_program
    if filters are absent or the result list is unchanged.
  strategies:
  - actions:
    - description: Only after search/list navigation is stable, extract visible product
        cards and active filters; do not force hidden price inputs.
      max_calls: 1
      output_contract:
      - model
      - price
      - specs
      - rating_or_comment_count
      - url
