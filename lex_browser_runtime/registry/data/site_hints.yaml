      max_calls: 8
      method: GET
      output_contract:
      - goodRate
      - totalCount
      - qualityStar
      - fiveStarCount
      type: api_call
      url_template: https://review.suning.com/ajax/review_satisfy/general-<commodityCode>-<shopCode>-----satisfy.htm
    confidence: suggest
    name: suning_schema_first_product_filter
    notes:
