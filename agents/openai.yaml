interface:
  display_name: "Lexmount Browser CLI"
  short_description: "Control Lexmount browsers from Codex"
  default_prompt: "Use $browser-cli to check version JSON, inspect workflow contracts with commands --workflow including connect_from_codex_site_requirements, device_code_auth, scoped_token_lifecycle, session_recovery, case_file_task, form_interaction, interactive_targeting, and page_diagnostics, follow workflow read arrays, read packaged references with reference get, inspect packaged examples with example get, inspect action guide before custom JavaScript, inspect case schema and scaffold/validate/run case files for repeatable tasks, verify auth with auth status/scopes/refresh/login/connect-requirements, use device-code --wait only after approval instructions are visible, run doctor --json before browser work, inspect commands before custom JavaScript, status-check/dry-run or pick persistent contexts and honor local_registry metadata diagnostics, operate sessions/actions with JSON output, and keep secrets out of chat."
