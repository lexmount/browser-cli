name: agent-primitives
description: Build a tiny page and exercise the agent observe, act, extract, and verify loop without custom browser automation code.
close_created_session: true
session:
  create: true
  browser_mode: null
steps:
- action: open-url
  url: about:blank
  wait_until: load
- action: eval
  expression: |
    () => {
      document.body.innerHTML = `
        <main>
          <h1>Agent primitives fixture</h1>
          <p id="summary">Revenue: $42</p>
          <p id="status" role="status" aria-live="polite">Waiting</p>
          <button type="button" aria-label="Generate insight">Generate insight</button>
          <a href="#details">Details</a>
        </main>
      `;
      const status = document.querySelector("#status");
      document.querySelector("[aria-label='Generate insight']").addEventListener("click", () => {
        status.textContent = "Insight generated";
        document.querySelector("#summary").textContent = "Revenue: $84";
      });
      return true;
    }
- action: observe
  surface:
  - interactive
  - text
  selector: main
  max_nodes: 40
  max_chars: 1000
- action: act
  kind: click
  role: button
  name: Generate insight
- action: extract
  surface:
  - text
  - links
  selector: main
  max_nodes: 40
  max_chars: 1000
- action: wait-text
  selector: '#status'
  text: Insight generated
  timeout_ms: 5000
- action: get-text
  selector: '#summary'
  expect:
    text: 'Revenue: $84'
- action: screenshot
  output: agent-primitives.png
