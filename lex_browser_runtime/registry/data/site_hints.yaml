3dmgame.com:
  hints:
  - "3DM search categories use numeric type params. For patch\u8BF4\u660E/\u7248\u672C\
    \u66F4\u65B0/news-like tasks, do not spend many steps in the \u8865\u4E01 category;\
    \ official update notes are often in \u65B0\u95FB. Use https://so.3dmgame.com/?keyword=<encoded\
    \ query>&type=7 for news search."
  - For Cyberpunk 2077 patch-update tasks, the current observed 3DM result is https://www.3dmgame.com/news/202509/3927674.html.
    Since the task only needs the latest patch note, call browser_api_call on that
    same-origin article detail after opening www.3dmgame.com; navigate the so.3dmgame.com
    search URL only if the article detail is insufficient.
  - If an article page has no direct patch package link, report that no direct download
    was observed and include the game resource page, e.g. https://www.3dmgame.com/games/cyberpunk2077/resource/,
    instead of repeatedly searching the patch-download category.
  - For 3DM Mod-site tasks on mod.3dmgame.com, prefer browser_api_call fetch_mode=http
    to POST https://mod.3dmgame.com/api/search/getModlist with JSON body {"search":"<game
    or mod keyword>","page":1,"limit":50,"order":2}; use the search field, not keyword.
    Then call https://mod.3dmgame.com/api/mods/{id} only for the top matching candidates.
  - For game patch/update tasks on www.3dmgame.com, use news/search result pages to
    find patch notes, then call browser_api_call on the article detail HTML once.
    Extract version, publish date, update bullets, and related download/resource links
    from the compact HTML.
  strategies:
  - actions:
    - description: Use 3DM search routes for the requested keyword/game before detail
        fan-out.
      output_contract: []
      type: direct_url
      url_template: https://so.3dmgame.com/?keyword=<encoded query>&type=7
    - description: For Mod ranking tasks, POST https://mod.3dmgame.com/api/search/getModlist
        with body {"search":"<keyword>","page":1,"limit":50,"order":2}; filter by
        gameName/title and call /api/mods/{id} only for top candidates.
      fetch_mode: http
      max_calls: 6
      method: POST
      output_contract:
      - id
      - gameName
      - title
      - downloadCount
      - updateTime
      type: api_call
    - description: For news/patch tasks, call compact HTML detail extraction on only
        top matching article/detail URLs.
      fetch_mode: browser
      max_calls: 5
      output_contract:
      - title
      - pubTime
      - version_or_update_time
      - download_or_resource_link
      - summary
      type: api_call
    confidence: suggest
    name: three_dm_search_detail_budget
    notes: []
    observable_validation:
    - candidate title matches the requested game or mod keyword
    - detail extraction returns publish/update information before final answer
    site_pattern: 3dmgame.com
    trigger: 3DM patch, update, Mod search, or bulk Mod ranking tasks
